<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çarpım Tablosu</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
<main class="game">

  <header class="header">
    <div class="header-left">
      <h1>Çarpım Tablosu ⭐</h1>
      <p class="tagline">Sayı seç, modu seç, başla!</p>
    </div>
    <a class="nav-btn" href="dashboard.html">📊 Harita</a>
  </header>

  <div class="content">

    <!-- ── Setup ────────────────────────────────── -->
    <div id="setup-panel">

      <div class="panel">
        <p class="panel-title">Hangi tabloyu çalışacaksın?</p>
        <div class="number-grid" id="number-grid"></div>
      </div>

      <div class="panel">
        <p class="panel-title">Hangi soruları seçmek istiyorsun?</p>
        <div class="emoji-presets" id="emoji-presets"></div>
      </div>

      <div class="panel">
        <div class="modes-row">
          <div class="mode-section">
            <p class="mode-section-label">Soru türü</p>
            <div class="toggle-group">
              <button class="mode-btn active" id="mode-mc"   type="button">🎯 Seçenekli</button>
              <button class="mode-btn"        id="mode-type" type="button">✍️ Yazarak</button>
            </div>
          </div>
          <div class="mode-section">
            <p class="mode-section-label">Mod</p>
            <div class="toggle-group">
              <button class="mode-btn active" id="timer-off" type="button">📖 Öğrenme</button>
              <button class="mode-btn"        id="timer-on"  type="button">⏱ Zamanlı Test</button>
            </div>
          </div>
        </div>
      </div>

      <button class="start-btn" id="start-btn" type="button" disabled>Başlat 🚀</button>

    </div>

    <!-- ── Quiz ─────────────────────────────────── -->
    <div class="panel hidden" id="quiz-panel">

      <div class="quiz-header">
        <div class="quiz-header-top">
          <div class="quiz-score-display">
            <span class="qs-num" id="mastered-pill">0</span>
            <span class="qs-slash">/</span>
            <span class="qs-total" id="score-total-el">0</span>
            <span class="qs-unit">doğru</span>
          </div>
          <div class="quiz-header-actions">
            <span class="pill hidden" id="timer-pill">⏱ 0s</span>
            <button type="button" class="exit-btn" id="exit-btn">✕ Çık</button>
          </div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="session-progress" style="width:0%"></div>
        </div>
        <div class="quiz-sub">
          <span id="attempts-pill">0 deneme</span>
        </div>
        <span class="hidden" id="remaining-pill"></span>
      </div>

      <div class="mult-table hidden" id="quiz-table"></div>

      <div class="question-area">
        <div id="question-text"></div>
      </div>

      <div class="mc-grid" id="mc-grid"></div>

      <div class="number-entry hidden" id="number-entry">
        <input type="number" id="answer-input" class="answer-input" min="1" max="100" autocomplete="off">
        <button type="button" class="submit-answer-btn" id="submit-answer-btn">Gönder →</button>
      </div>

      <div class="feedback" id="feedback"></div>

    </div>

    <!-- ── Summary ───────────────────────────────── -->
    <div class="panel hidden" id="summary-panel">
      <p id="summary-text"></p>
      <p id="summary-detail"></p>
      <div style="text-align:center">
        <button class="replay-btn" id="play-again-btn" type="button">Tekrar Oyna 🔄</button>
      </div>
    </div>

  </div>
</main>
<script src="index.js"></script>
</body>
</html>
