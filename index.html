<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çarpma Oyunu</title>
  <style>
    :root {
      --bg-top: #ffe7b3;
      --bg-bottom: #ffd1dc;
      --card: rgba(255, 255, 255, 0.88);
      --text: #20304a;
      --accent: #ff7a59;
      --accent-strong: #ff5b37;
      --success: #1f9d68;
      --error: #d64545;
      --shadow: 0 22px 60px rgba(53, 41, 85, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.4), transparent 25%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .game {
      width: min(100%, 760px);
      background: var(--card);
      border: 4px solid rgba(255,255,255,0.7);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 28px 28px 18px;
      background: linear-gradient(135deg, rgba(255,122,89,0.22), rgba(255,233,130,0.38));
    }

    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); line-height: 1; }

    .subtitle { margin: 10px 0 0; font-size: 1.05rem; }

    .content { padding: 24px 28px 32px; display: grid; gap: 20px; }

    .panel {
      background: rgba(255,255,255,0.75);
      border-radius: 24px;
      padding: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    button { font: inherit; }

    .number-btn, .primary-btn, .choice-btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .number-btn {
      background: #fff3d9;
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 700;
      box-shadow: 0 8px 16px rgba(255,122,89,0.15);
    }

    .number-btn:hover, .number-btn:focus-visible,
    .primary-btn:hover, .primary-btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(53,41,85,0.16);
      outline: none;
    }

    .number-btn.active { background: var(--accent); color: white; }

    .primary-btn {
      background: var(--accent);
      color: white;
      font-weight: 700;
    }

    .primary-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* --- quiz top bar --- */
    .quiz-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      background: #fff3d9;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 700;
    }

    .pill.timer-urgent { background: #ffd1d1; color: var(--error); }

    /* --- question --- */
    .question {
      font-size: clamp(2.4rem, 8vw, 4.4rem);
      text-align: center;
      font-weight: 800;
      margin: 18px 0 10px;
      letter-spacing: 0.04em;
    }

    /* --- multiple choice buttons --- */
    .mc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 14px;
    }

    .choice-btn {
      background: #fff3d9;
      color: var(--text);
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 8px 20px rgba(255,122,89,0.13);
      padding: 22px 10px;
    }

    .choice-btn:hover:not(:disabled), .choice-btn:focus-visible:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(53,41,85,0.16);
      outline: none;
      background: #ffe8b2;
    }

    .choice-btn:disabled { cursor: default; }

    .choice-btn.correct { background: #d4f5e5; color: var(--success); }
    .choice-btn.wrong   { background: #fde0e0; color: var(--error); }
    .choice-btn.reveal  { background: #d4f5e5; color: var(--success); }

    /* --- feedback --- */
    .feedback {
      min-height: 2rem;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      margin-top: 14px;
    }
    .feedback.success { color: var(--success); }
    .feedback.error   { color: var(--error); }

    /* --- summary --- */
    .summary { text-align: center; }
    .summary strong { font-size: 1.3rem; }

    .answer-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }

    .hidden { display: none; }

    .name-input {
      width: 100%;
      border: 3px solid #ffd69b;
      background: white;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-top: 16px;
    }
    .name-input:focus { outline: none; border-color: var(--accent); }

    .greeting {
      margin: 8px 0 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .hero, .content { padding-left: 14px; padding-right: 14px; }
      .hero { padding-top: 18px; padding-bottom: 12px; }
      .panel { padding: 14px; }
      .mc-grid { gap: 8px; }
      .choice-btn { font-size: 1.2rem; padding: 14px 6px; }
      .pill { padding: 6px 10px; font-size: 0.85rem; }
      .question { margin: 12px 0 8px; }
      .name-input { font-size: 1.1rem; padding: 12px 14px; }
    }

    @media (max-width: 400px) {
      .hero-top { flex-wrap: wrap; gap: 8px; }
      h1 { font-size: 1.8rem; }
      .choice-btn { font-size: 1rem; padding: 12px 4px; }
      .number-btn { font-size: 1.1rem; padding: 11px 10px; }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="hero">
      <div class="hero-top">
        <h1>Çarpma Oyunu</h1>
        <a href="learn.html" style="font:inherit;font-size:0.9rem;font-weight:700;color:#1f9d68;background:rgba(255,255,255,0.7);border:2px solid rgba(31,157,104,0.3);border-radius:999px;padding:7px 14px;text-decoration:none;white-space:nowrap;">Öğrenme Modu →</a>
      </div>
      <p class="subtitle">Çalışmak istediğin sayıları seç — her sayı için 30 saniye verilir.</p>
      <p class="greeting hidden" id="greeting"></p>
    </section>

    <section class="content">
      <!-- Welcome -->
      <section class="panel" id="welcome-panel">
        <h2>Merhaba! Adın ne?</h2>
        <input class="name-input" id="name-input" type="text" maxlength="30" placeholder="Adını yaz...">
        <div class="answer-row">
          <button class="primary-btn" id="name-btn" type="button" disabled>Başlayalım</button>
        </div>
      </section>

      <!-- Setup -->
      <section class="panel hidden" id="setup-panel">
        <h2>Hangi sayıları çalışmak istiyorsun?</h2>
        <div class="choices" id="number-choices" aria-label="2'den 10'a kadar sayılar"></div>
        <div class="answer-row">
          <button class="primary-btn" id="start-btn" type="button" disabled>Oyunu Başlat</button>
        </div>
      </section>

      <!-- Quiz -->
      <section class="panel hidden" id="quiz-panel">
        <div class="quiz-top">
          <div class="pill" id="timer-pill">⏱ 60s</div>
          <div class="pill" id="answered-pill">Cevaplanan: 0</div>
          <div class="pill" id="score-pill">Puan: 0</div>
        </div>

        <div class="question" id="question-text"></div>

        <div class="mc-grid" id="mc-grid"></div>

        <div class="feedback" id="feedback"></div>
      </section>

      <!-- Summary -->
      <section class="panel summary hidden" id="summary-panel">
        <p><strong id="summary-text"></strong></p>
        <p id="summary-detail"></p>
        <div class="answer-row">
          <button class="primary-btn" id="play-again-btn" type="button">Tekrar Oyna</button>
        </div>
      </section>
    </section>
  </main>

  <script>
    const numberChoices  = document.getElementById("number-choices");
    const startButton    = document.getElementById("start-btn");
    const playAgainButton = document.getElementById("play-again-btn");
    const setupPanel     = document.getElementById("setup-panel");
    const quizPanel      = document.getElementById("quiz-panel");
    const summaryPanel   = document.getElementById("summary-panel");
    const welcomePanel   = document.getElementById("welcome-panel");
    const nameInput      = document.getElementById("name-input");
    const nameBtn        = document.getElementById("name-btn");
    const greetingEl     = document.getElementById("greeting");
    const timerPill      = document.getElementById("timer-pill");
    const answeredPill   = document.getElementById("answered-pill");
    const scorePill      = document.getElementById("score-pill");
    const questionText   = document.getElementById("question-text");
    const mcGrid         = document.getElementById("mc-grid");
    const feedback       = document.getElementById("feedback");
    const summaryText    = document.getElementById("summary-text");
    const summaryDetail  = document.getElementById("summary-detail");

    const NAME_KEY = "multiply_username";
    function getName() { return localStorage.getItem(NAME_KEY) || ""; }
    function saveName(n) { localStorage.setItem(NAME_KEY, n.trim()); }

    function showGreeting() {
      const name = getName();
      if (!name) return;
      greetingEl.textContent = `Hoş geldin, ${name}!`;
      greetingEl.classList.remove("hidden");
    }

    function initName() {
      const name = getName();
      if (name) {
        welcomePanel.classList.add("hidden");
        setupPanel.classList.remove("hidden");
        showGreeting();
      }
    }

    nameInput.addEventListener("input", () => {
      nameBtn.disabled = nameInput.value.trim().length === 0;
    });
    nameInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && nameInput.value.trim()) nameBtn.click();
    });
    nameBtn.addEventListener("click", () => {
      saveName(nameInput.value);
      welcomePanel.classList.add("hidden");
      setupPanel.classList.remove("hidden");
      showGreeting();
    });

    const TIME_PER_NUMBER = 30;
    const selectedNumbers = new Set();
    let score = 0;
    let answered = 0;
    let correct = 0;
    let timeLeft = 0;
    let timerInterval = null;
    let locked = false;
    let questionPool = [];   // questions not yet answered correctly
    let currentQuestion = null;
    let initialPoolSize = 0;

    function normalizedScore() {
      if (initialPoolSize === 0) return 0;
      return Math.round(Math.max(0, Math.min(100, (score / initialPoolSize) * 100)));
    }

    // ── setup buttons ────────────────────────────────────────────────────────

    function buildChoiceButtons() {
      for (let n = 2; n <= 10; n++) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "number-btn";
        btn.textContent = n;
        btn.dataset.number = n;
        btn.addEventListener("click", () => {
          if (selectedNumbers.has(n)) selectedNumbers.delete(n);
          else selectedNumbers.add(n);
          btn.classList.toggle("active", selectedNumbers.has(n));
          startButton.disabled = selectedNumbers.size === 0;
        });
        numberChoices.appendChild(btn);
      }
    }

    // ── question helpers ─────────────────────────────────────────────────────

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildPool() {
      const pool = [];
      for (const n of selectedNumbers) {
        for (let m = 1; m <= 10; m++) {
          pool.push({ factorA: n, factorB: m, answer: n * m });
        }
      }
      return shuffle(pool);
    }

    function generateChoices(correct) {
      const offsets = shuffle([-7,-6,-5,-4,-3,-2,-1,1,2,3,4,5,6,7]);
      const wrong = [];
      for (const offset of offsets) {
        const candidate = correct + offset;
        if (candidate > 0 && candidate !== correct && !wrong.includes(candidate)) {
          wrong.push(candidate);
          if (wrong.length === 2) break;
        }
      }
      return shuffle([correct, ...wrong]);
    }

    function nextQuestion() {
      if (questionPool.length === 0) {
        endGame(true);
        return;
      }

      locked = false;
      feedback.textContent = "";
      feedback.className = "feedback";

      const idx = Math.floor(Math.random() * questionPool.length);
      currentQuestion = questionPool[idx];

      questionText.textContent = `${currentQuestion.factorA} × ${currentQuestion.factorB} = ?`;

      const choices = generateChoices(currentQuestion.answer);
      mcGrid.innerHTML = "";
      choices.forEach(value => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.textContent = value;
        btn.addEventListener("click", () => handleChoice(btn, value));
        mcGrid.appendChild(btn);
      });
    }

    // ── answer handling ──────────────────────────────────────────────────────

    function playVictory() {
      const ctx    = new (window.AudioContext || window.webkitAudioContext)();
      const master = ctx.createGain();
      master.connect(ctx.destination);
      [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = "sine"; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(master);
        const t = ctx.currentTime + i * 0.13;
        gain.gain.setValueAtTime(0.28, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        osc.start(t); osc.stop(t + 0.35);
      });
      [523.25, 659.25, 783.99].forEach(freq => {
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = "sine"; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(master);
        const t = ctx.currentTime + 4 * 0.13;
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
        osc.start(t); osc.stop(t + 0.9);
      });
    }

    function launchConfetti() {
      const canvas = document.createElement("canvas");
      canvas.style.cssText =
        "position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;";
      document.body.appendChild(canvas);
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const c = canvas.getContext("2d");
      const colors = ["#ff7a59","#ffd700","#ff4081","#7c4dff","#00bcd4","#ff9800","#2eaa82"];
      const particles = Array.from({ length: 140 }, () => ({
        x: Math.random() * canvas.width, y: -10 - Math.random() * 60,
        vx: (Math.random() - 0.5) * 5, vy: Math.random() * 3 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        w: Math.random() * 10 + 5, h: Math.random() * 5 + 3,
        angle: Math.random() * Math.PI * 2, spin: (Math.random() - 0.5) * 0.18,
      }));
      const duration = 3200; let start = null;
      function frame(ts) {
        if (!start) start = ts;
        const elapsed = ts - start;
        c.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.angle += p.spin;
          c.save(); c.translate(p.x, p.y); c.rotate(p.angle);
          c.globalAlpha = Math.max(0, 1 - elapsed / duration);
          c.fillStyle = p.color;
          c.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          c.restore();
        });
        if (elapsed < duration) requestAnimationFrame(frame);
        else canvas.remove();
      }
      requestAnimationFrame(frame);
    }

    function playFeedback(correct) {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const gain = ctx.createGain();
      gain.connect(ctx.destination);

      if (correct) {
        // two ascending sine tones
        [523, 784].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          osc.type = "sine";
          osc.frequency.value = freq;
          osc.connect(gain);
          gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.12);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.22);
          osc.start(ctx.currentTime + i * 0.12);
          osc.stop(ctx.currentTime + i * 0.12 + 0.22);
        });
      } else {
        // descending sawtooth buzz
        const osc = ctx.createOscillator();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(280, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(140, ctx.currentTime + 0.35);
        osc.connect(gain);
        gain.gain.setValueAtTime(0.18, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.35);
      }
    }

    function handleChoice(btn, value) {
      if (locked) return;
      locked = true;
      answered++;

      const allBtns = mcGrid.querySelectorAll(".choice-btn");
      allBtns.forEach(b => b.disabled = true);

      if (value === currentQuestion.answer) {
        score++;
        correct++;
        // remove from pool — answered correctly, won't appear again
        questionPool = questionPool.filter(q => q !== currentQuestion);
        playFeedback(true);
        btn.classList.add("correct");
        feedback.textContent = "Doğru!";
        feedback.className = "feedback success";
      } else {
        score--;
        playFeedback(false);
        btn.classList.add("wrong");
        // keep in pool — will be asked again
        allBtns.forEach(b => {
          if (Number(b.textContent) === currentQuestion.answer) b.classList.add("reveal");
        });
        feedback.textContent = `Yanlış! Doğru cevap: ${currentQuestion.answer}. −1`;
        feedback.className = "feedback error";
      }

      answeredPill.textContent = `Cevaplanan: ${answered}`;
      scorePill.textContent = `Puan: ${normalizedScore()}`;

      setTimeout(nextQuestion, 900);
    }

    // ── timer ────────────────────────────────────────────────────────────────

    function startTimer() {
      timeLeft = selectedNumbers.size * TIME_PER_NUMBER;
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    function updateTimerDisplay() {
      timerPill.textContent = `⏱ ${timeLeft}s`;
      timerPill.classList.toggle("timer-urgent", timeLeft <= 10);
    }

    // ── game flow ────────────────────────────────────────────────────────────

    function startGame() {
      score = 0;
      answered = 0;
      correct = 0;
      locked = false;
      questionPool = buildPool();
      initialPoolSize = questionPool.length;

      setupPanel.classList.add("hidden");
      summaryPanel.classList.add("hidden");
      quizPanel.classList.remove("hidden");

      scorePill.textContent = "Puan: 0";
      answeredPill.textContent = "Cevaplanan: 0";

      nextQuestion();
      startTimer();
    }

    function endGame(cleared = false) {
      clearInterval(timerInterval);
      timerInterval = null;
      locked = true;

      quizPanel.classList.add("hidden");
      summaryPanel.classList.remove("hidden");

      const ns    = normalizedScore();
      const wrong = answered - correct;
      const name  = getName();
      const nameTag = name ? ` ${name}` : "";
      summaryText.textContent = cleared
        ? `Tebrikler${nameTag}! Toplam puan: ${ns} / 100`
        : `Süre doldu${nameTag}! Toplam puan: ${ns} / 100`;
      summaryDetail.textContent =
        `${answered} soruyu cevapladın: ` +
        `${correct} doğru, ${wrong} yanlış.`;

      if (ns === 100) {
        playVictory();
        launchConfetti();
      }
    }

    startButton.addEventListener("click", startGame);
    playAgainButton.addEventListener("click", () => {
      summaryPanel.classList.add("hidden");
      setupPanel.classList.remove("hidden");
    });

    buildChoiceButtons();
    initName();
  </script>
</body>
</html>
