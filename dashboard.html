<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İlerleme Haritam</title>
  <style>
    :root {
      --bg-top: #4ecde8;
      --bg-bottom: #a78bfa;
      --card: rgba(255,255,255,0.96);
      --text: #1e1b4b;
      --accent: #f97316;
      --shadow: 0 24px 64px rgba(109,40,217,0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,0.6) 0%, transparent 28%),
        radial-gradient(circle at 88% 88%, rgba(255,255,255,0.4) 0%, transparent 22%),
        linear-gradient(155deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 14px 48px;
      overflow-x: hidden;
    }

    .game {
      width: min(100%, 760px);
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      padding: 22px 28px 18px;
      background: linear-gradient(135deg, rgba(249,115,22,0.13) 0%, rgba(78,205,232,0.2) 100%);
      border-bottom: 1.5px solid rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-left { display: flex; flex-direction: column; gap: 3px; }
    h1 { margin: 0; font-size: clamp(1.5rem, 4vw, 2.2rem); line-height: 1.1; }
    .tagline { margin: 0; font-size: 0.88rem; opacity: 0.65; }

    .nav-btn {
      flex-shrink: 0;
      font: inherit; font-size: 0.85rem; font-weight: 700;
      color: var(--accent); background: white;
      border: 2px solid rgba(249,115,22,0.28); border-radius: 999px;
      padding: 7px 16px; text-decoration: none; white-space: nowrap;
      transition: background 120ms, border-color 120ms;
    }
    .nav-btn:hover { background: #fff7ed; border-color: var(--accent); }

    /* ── Content ─────────────────────────────────── */
    .content { padding: 20px 24px 28px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Panel ───────────────────────────────────── */
    .panel {
      background: rgba(245,248,255,0.72);
      border-radius: 20px;
      padding: 18px 20px;
      border: 1.5px solid rgba(255,255,255,0.75);
    }
    .panel h2 { margin: 0 0 14px; font-size: 1rem; font-weight: 800; opacity: 0.8; }

    /* ── Overall progress ────────────────────────── */
    .progress-summary {
      display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .progress-fraction {
      font-size: 1.5rem; font-weight: 800; line-height: 1;
    }
    .progress-pct {
      font-size: 1rem; font-weight: 700; opacity: 0.6;
    }
    .progress-label-text {
      font-size: 0.88rem; opacity: 0.65; margin-left: auto;
    }
    .progress-track {
      background: #e0e7ff;
      border-radius: 999px;
      height: 14px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f97316, #fb923c);
      border-radius: 999px;
      transition: width 600ms ease;
      width: 0%;
    }

    /* ── Fact grid ───────────────────────────────── */
    .fact-grid {
      display: grid;
      grid-template-columns: 36px repeat(10, 1fr);
      gap: 5px;
    }
    .grid-corner, .grid-header {
      text-align: center; font-weight: 800; font-size: 0.8rem;
      padding: 5px 2px; color: #9ca3af;
    }
    .grid-row-label {
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.88rem; color: var(--text);
    }
    .grid-cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 9px; font-size: clamp(0.78rem, 2.2vw, 1.15rem);
      cursor: default; transition: transform 120ms; background: #f0f0f0;
      border: 1.5px solid rgba(255,255,255,0.6);
    }
    .grid-cell:hover { transform: scale(1.2); z-index: 1; position: relative; }

    /* ── Legend ──────────────────────────────────── */
    .legend {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px;
      padding-top: 12px; border-top: 1.5px solid rgba(0,0,0,0.06);
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; font-weight: 700;
    }
    .legend-dot {
      width: 24px; height: 24px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.6);
    }

    /* ── Reset button ────────────────────────────── */
    .reset-panel { display: flex; justify-content: center; }
    .reset-btn {
      border: 2px solid #e5e7eb; border-radius: 14px; padding: 11px 24px;
      background: transparent; color: #9ca3af;
      font: inherit; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: border-color 130ms, color 130ms, background 130ms;
    }
    .reset-btn:hover { border-color: #dc2626; color: #dc2626; background: #fff5f5; }
    .reset-btn:focus-visible { outline: 3px solid rgba(220,38,38,0.3); outline-offset: 2px; }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 600px) {
      body { padding: 12px 10px 36px; }
      .header { padding: 16px 14px 14px; }
      .content { padding: 14px 12px 20px; gap: 12px; }
      .panel { padding: 14px; }
      .fact-grid { gap: 3px; grid-template-columns: 28px repeat(10, 1fr); }
      .grid-corner, .grid-header { font-size: 0.7rem; padding: 4px 1px; }
      .grid-row-label { font-size: 0.75rem; }
      .grid-cell { border-radius: 7px; }
    }

    @media (max-width: 400px) {
      body { padding: 8px 8px 28px; }
      .header { padding: 14px 12px 12px; }
      .content { padding: 10px 10px 16px; gap: 10px; }
      .panel { padding: 12px; }
      h1 { font-size: 1.4rem; }
      .fact-grid { gap: 2px; grid-template-columns: 22px repeat(10, 1fr); }
      .grid-corner, .grid-header { font-size: 0.62rem; }
      .grid-row-label { font-size: 0.62rem; }
      .legend-item { font-size: 0.75rem; }
      .legend-dot { width: 20px; height: 20px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>
<main class="game">

  <header class="header">
    <div class="header-left">
      <h1>📊 İlerleme Haritam</h1>
      <p class="tagline">Ne kadar öğrendim?</p>
    </div>
    <a class="nav-btn" href="index.html">← Çalış</a>
  </header>

  <div class="content">

    <!-- Overall progress -->
    <section class="panel">
      <h2>Genel İlerleme</h2>
      <div class="progress-summary">
        <span class="progress-fraction" id="progress-fraction">0 / 90</span>
        <span class="progress-pct" id="progress-pct">%0</span>
        <span class="progress-label-text">ustalaştığın soru</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <!-- Grid -->
    <section class="panel">
      <h2>Tablo Haritası</h2>
      <div class="fact-grid" id="fact-grid"></div>
      <div class="legend" id="legend"></div>
    </section>

    <!-- Reset -->
    <div class="reset-panel">
      <button class="reset-btn" id="reset-btn" type="button">İlerlemeyi Sıfırla</button>
    </div>

  </div>
</main>

<script>
  const STORAGE_KEY = "multiply_learn_states";
  const STATE_EMOJI = { n: "❔", lg: "🙂", dg: "⭐", or: "😕", rd: "😰" };
  const STATE_BG    = { n: "#f0f0f0", lg: "#d4f5e5", dg: "#86efac", or: "#fed7aa", rd: "#fca5a5" };
  const STATE_LABEL = { n: "Denenmedi", lg: "1 kez doğru", dg: "Ustalaştın!", or: "Zorlandın", rd: "Tekrar lazım" };

  const progressFraction = document.getElementById("progress-fraction");
  const progressPct      = document.getElementById("progress-pct");
  const progressFill     = document.getElementById("progress-fill");
  const factGrid         = document.getElementById("fact-grid");
  const legendEl         = document.getElementById("legend");
  const resetBtn         = document.getElementById("reset-btn");

  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function buildGrid() {
    factGrid.innerHTML = "";

    const corner = document.createElement("div");
    corner.className = "grid-corner";
    corner.textContent = "×";
    factGrid.appendChild(corner);

    for (let m = 1; m <= 10; m++) {
      const h = document.createElement("div");
      h.className = "grid-header";
      h.textContent = m;
      factGrid.appendChild(h);
    }

    for (let n = 2; n <= 10; n++) {
      const label = document.createElement("div");
      label.className = "grid-row-label";
      label.textContent = n;
      factGrid.appendChild(label);

      for (let m = 1; m <= 10; m++) {
        const cell = document.createElement("div");
        cell.className = "grid-cell";
        cell.dataset.n = n;
        cell.dataset.m = m;
        cell.title = `${n} × ${m} = ${n * m}`;
        factGrid.appendChild(cell);
      }
    }
  }

  function buildLegend() {
    legendEl.innerHTML = "";
    Object.entries(STATE_LABEL).forEach(([st, label]) => {
      const item = document.createElement("div");
      item.className = "legend-item";
      const dot = document.createElement("div");
      dot.className = "legend-dot";
      dot.style.background = STATE_BG[st];
      dot.textContent = STATE_EMOJI[st];
      item.appendChild(dot);
      item.appendChild(document.createTextNode(label));
      legendEl.appendChild(item);
    });
  }

  function renderDashboard() {
    const d = loadData();
    let mastered = 0;

    for (let n = 2; n <= 10; n++) {
      for (let m = 1; m <= 10; m++) {
        const st = d[`${n}_${m}`] || "n";
        const cell = factGrid.querySelector(`[data-n="${n}"][data-m="${m}"]`);
        cell.textContent      = STATE_EMOJI[st];
        cell.style.background = STATE_BG[st];
        if (st === "dg") mastered++;
      }
    }

    const pct = Math.round(mastered / 90 * 100);
    progressFill.style.width      = `${pct}%`;
    progressFraction.textContent  = `${mastered} / 90`;
    progressPct.textContent       = `%${pct}`;
  }

  resetBtn.addEventListener("click", () => {
    if (!confirm("Tüm ilerleme silinecek. Emin misin?")) return;
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem("multiply_exam_states");
    localStorage.removeItem("multiply_flashcard_states");
    renderDashboard();
  });

  buildGrid();
  buildLegend();
  renderDashboard();
</script>
</body>
</html>
