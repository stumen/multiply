<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İlerleme Haritam</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<main class="game">

  <header class="header">
    <div class="header-left">
      <h1>📊 İlerleme Haritam</h1>
      <p class="tagline">Ne kadar öğrendim?</p>
    </div>
    <a class="nav-btn" href="index.html">← Çalış</a>
  </header>

  <div class="content">

    <section class="panel">
      <h2>Genel İlerleme</h2>
      <div class="progress-summary">
        <span class="progress-fraction" id="progress-fraction">0 / 64</span>
        <span class="progress-pct" id="progress-pct">%0</span>
        <span class="progress-label-text">ustalaştığın soru</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <section class="panel">
      <h2>Tablo Haritası</h2>
      <div class="fact-grid" id="fact-grid"></div>
      <div class="legend" id="legend"></div>
    </section>

    <div class="reset-panel">
      <button class="reset-btn" id="reset-btn" type="button">İlerlemeyi Sıfırla</button>
    </div>

  </div>
</main>
<script src="dashboard.js"></script>
</body>
</html>
