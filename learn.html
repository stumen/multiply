<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çarpma — Öğrenme Modu</title>
  <style>
    :root {
      --bg-top: #c8f0e8;
      --bg-bottom: #b8dff5;
      --card: rgba(255,255,255,0.88);
      --text: #20304a;
      --accent: #2eaa82;
      --shadow: 0 22px 60px rgba(30,60,80,0.18);

      --c-neutral-bg:  #f0f0f0;  --c-neutral-bar:  #bbb;
      --c-lg-bg:       #d4f5e5;  --c-lg-bar:       #4caf7d;
      --c-dg-bg:       #a5d6a7;  --c-dg-bar:       #1b7a45;
      --c-or-bg:       #ffe0b2;  --c-or-bar:       #fb8c00;
      --c-rd-bg:       #ffcdd2;  --c-rd-bar:       #e53935;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.4), transparent 25%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .game {
      width: min(100%, 780px);
      background: var(--card);
      border: 4px solid rgba(255,255,255,0.7);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    /* ── hero ── */
    .hero {
      padding: 24px 28px 16px;
      background: linear-gradient(135deg, rgba(46,170,130,0.18), rgba(130,210,255,0.30));
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 2.6rem); line-height: 1; }
    .subtitle { margin: 8px 0 0; font-size: 0.98rem; opacity: 0.8; }
    .nav-link {
      font: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--accent);
      background: rgba(255,255,255,0.75);
      border: 2px solid rgba(46,170,130,0.3);
      border-radius: 999px;
      padding: 6px 14px;
      text-decoration: none;
      white-space: nowrap;
      transition: background 140ms;
    }
    .nav-link:hover { background: white; }

    /* ── layout ── */
    .content { padding: 20px 28px 28px; display: grid; gap: 16px; }

    .panel {
      background: rgba(255,255,255,0.78);
      border-radius: 24px;
      padding: 20px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    /* ── number buttons ── */
    .number-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    button { font: inherit; }
    .number-btn {
      border: 0;
      border-radius: 16px;
      padding: 12px 8px;
      font-size: 1.3rem;
      font-weight: 700;
      background: #e0f7f1;
      color: var(--text);
      cursor: pointer;
      position: relative;
      box-shadow: 0 6px 14px rgba(46,170,130,0.15);
      transition: transform 130ms, box-shadow 130ms, background 130ms;
    }
    .number-btn:hover { transform: translateY(-2px); }
    .number-btn.active { background: var(--accent); color: white; }

    /* mastery badge */
    .mbadge {
      position: absolute;
      top: -5px; right: -5px;
      background: #1b7a45;
      color: white;
      font-size: 0.58rem;
      font-weight: 800;
      border-radius: 999px;
      padding: 2px 5px;
      line-height: 1.4;
    }

    /* ── primary / ghost buttons ── */
    .primary-btn {
      border: 0;
      border-radius: 16px;
      padding: 13px 28px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: transform 130ms, box-shadow 130ms;
    }
    .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 22px rgba(30,60,80,0.16); }
    .primary-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

    .ghost-btn {
      border: 2px solid #ccc;
      border-radius: 16px;
      padding: 11px 20px;
      background: transparent;
      color: #888;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 130ms, color 130ms;
    }
    .ghost-btn:hover { border-color: #e53935; color: #e53935; }

    .answer-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 16px;
    }

    /* ── mastery progress bar ── */
    .progress-wrap { margin-top: 14px; }
    .progress-label { font-size: 0.9rem; color: #555; margin-bottom: 5px; }
    .progress-track {
      background: #d0ede7;
      border-radius: 999px;
      height: 9px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 400ms ease;
    }

    /* ── multiplication table ── */
    .mult-table {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      margin: 12px 0 16px;
    }
    .trow {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      border-radius: 10px;
      padding: 7px 2px;
      font-size: 0.95rem;
      font-weight: 800;
      background: #e0f7f1;
      color: var(--text);
      border: 3px solid transparent;
      transition: border-color 200ms;
    }
    .trow.current { border-color: var(--accent); }
    .trow-emoji { font-size: 0.85rem; line-height: 1; }

    /* ── quiz top pills ── */
    .quiz-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 4px;
    }
    .pill {
      background: #d4ede8;
      border-radius: 999px;
      padding: 7px 14px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* ── question & choices ── */
    .question {
      font-size: clamp(2.2rem, 7vw, 3.8rem);
      text-align: center;
      font-weight: 800;
      margin: 4px 0 10px;
      letter-spacing: 0.04em;
    }
    .mc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .choice-btn {
      border: 0;
      border-radius: 16px;
      padding: 20px 8px;
      background: #e0f7f1;
      color: var(--text);
      font-size: 1.55rem;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 7px 18px rgba(46,170,130,0.13);
      cursor: pointer;
      transition: transform 130ms, box-shadow 130ms, background 130ms;
    }
    .choice-btn:hover:not(:disabled) { transform: translateY(-3px); background: #c2ede3; }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct { background: #d4f5e5; color: #1b7a45; }
    .choice-btn.wrong   { background: #ffcdd2; color: #c62828; }
    .choice-btn.reveal  { background: #d4f5e5; color: #1b7a45; }

    .feedback {
      min-height: 1.8rem;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      margin-top: 12px;
    }
    .feedback.ok  { color: #1b7a45; }
    .feedback.err { color: #c62828; }

    /* ── summary ── */
    .summary { text-align: center; }
    .summary strong { font-size: 1.25rem; }
    .summary p { margin: 8px 0; }


    .hidden { display: none; }

    @media (max-width: 600px) {
      .content { padding: 16px 18px 24px; }
      .panel { padding: 16px; }
      .mc-grid { gap: 8px; }
      .choice-btn { font-size: 1.25rem; padding: 16px 6px; }
    }
  </style>
</head>
<body>
<main class="game">
  <section class="hero">
    <div class="hero-top">
      <h1>Öğrenme Modu</h1>
      <a class="nav-link" href="index.html">Test Modu →</a>
    </div>
    <p class="subtitle">Bir sayı seç — soruları doğru bil ve renklerini yeşile çevir.</p>
  </section>

  <section class="content">

    <!-- Setup -->
    <section class="panel" id="setup-panel">
      <h2 style="margin:0 0 4px;">Hangi sayıyı çalışmak istiyorsun?</h2>
      <div class="number-grid" id="number-grid"></div>

      <div class="progress-wrap hidden" id="progress-wrap">
        <div class="progress-label" id="progress-label"></div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <!-- table preview in setup -->
      <div class="mult-table hidden" id="setup-table"></div>


      <div class="answer-row">
        <button class="primary-btn" id="start-btn" type="button" disabled>Başlat</button>
        <button class="ghost-btn"   id="reset-btn" type="button">İlerlemeyi Sıfırla</button>
      </div>
    </section>

    <!-- Quiz -->
    <section class="panel hidden" id="quiz-panel">
      <div class="quiz-top">
        <div class="pill" id="remaining-pill">Kaldı: 0</div>
        <div class="pill" id="mastered-pill">Ustalaşılan: 0 / 10</div>
      </div>

      <div class="mult-table" id="quiz-table"></div>

      <div class="question" id="question-text"></div>
      <div class="mc-grid"  id="mc-grid"></div>
      <div class="feedback" id="feedback"></div>
    </section>

    <!-- Summary -->
    <section class="panel summary hidden" id="summary-panel">
      <p><strong id="summary-text"></strong></p>
      <p id="summary-detail"></p>
      <p id="summary-total"></p>
      <div class="answer-row">
        <button class="primary-btn" id="play-again-btn" type="button">Tekrar Çalış</button>
      </div>
    </section>

  </section>
</main>

<script>
  // ── DOM refs ─────────────────────────────────────────────────────────────
  const numberGrid    = document.getElementById("number-grid");
  const startBtn      = document.getElementById("start-btn");
  const resetBtn      = document.getElementById("reset-btn");
  const playAgainBtn  = document.getElementById("play-again-btn");
  const setupPanel    = document.getElementById("setup-panel");
  const quizPanel     = document.getElementById("quiz-panel");
  const summaryPanel  = document.getElementById("summary-panel");
  const remainingPill = document.getElementById("remaining-pill");
  const masteredPill  = document.getElementById("mastered-pill");
  const questionText  = document.getElementById("question-text");
  const mcGrid        = document.getElementById("mc-grid");
  const feedback      = document.getElementById("feedback");
  const summaryText   = document.getElementById("summary-text");
  const summaryDetail = document.getElementById("summary-detail");
  const summaryTotal  = document.getElementById("summary-total");
  const setupTable    = document.getElementById("setup-table");
  const quizTable     = document.getElementById("quiz-table");
  const progressWrap  = document.getElementById("progress-wrap");
  const progressLabel = document.getElementById("progress-label");
  const progressFill  = document.getElementById("progress-fill");

  // ── constants ─────────────────────────────────────────────────────────────
  const STORAGE_KEY = "multiply_states_v2";

  // state codes: n=neutral, lg=light-green, dg=dark-green, or=orange, rd=red
  const STATE_EMOJI = { n: "", lg: "🙂", dg: "⭐", or: "😕", rd: "😰" };

  // ── state ─────────────────────────────────────────────────────────────────
  let selectedNumber  = null;
  let questionQueue   = [];
  let currentQuestion = null;
  let locked          = false;
  let sessionMastered = 0;
  let sessionAttempts = 0;

  // ── persistence ───────────────────────────────────────────────────────────
  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }
  function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
  function stateKey(n, m) { return `${n}_${m}`; }
  function getState(d, n, m) { return d[stateKey(n, m)] || "n"; }

  function nextState(current, correct) {
    if (correct) {
      if (current === "dg") return "dg";
      if (current === "lg") return "dg";
      return "lg";   // n, or, rd → lg
    } else {
      if (current === "or" || current === "rd") return "rd";
      return "or";   // n, lg → or
    }
  }

  // ── helpers ───────────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generateChoices(correct) {
    const offs = shuffle([-7,-6,-5,-4,-3,-2,-1,1,2,3,4,5,6,7]);
    const wrong = [];
    for (const o of offs) {
      const c = correct + o;
      if (c > 0 && c !== correct && !wrong.includes(c)) {
        wrong.push(c);
        if (wrong.length === 2) break;
      }
    }
    return shuffle([correct, ...wrong]);
  }

  // ── multiplication table rendering ────────────────────────────────────────
  function renderTable(container, n, currentQ) {
    const d = loadData();
    container.innerHTML = "";
    for (let m = 1; m <= 10; m++) {
      const st  = getState(d, n, m);
      const row = document.createElement("div");
      row.className = "trow";
      row.dataset.m = m;
      if (currentQ && currentQ.factorB === m) row.classList.add("current");
      row.innerHTML = `<span>${m}</span><span class="trow-emoji">${STATE_EMOJI[st]}</span>`;
      container.appendChild(row);
    }
  }

  function updateTableRow(m) {
    const d   = loadData();
    const st  = getState(d, selectedNumber, m);
    const row = quizTable.querySelector(`[data-m="${m}"]`);
    if (!row) return;
    row.className = "trow";
    if (currentQuestion && currentQuestion.factorB === m) row.classList.add("current");
    row.querySelector(".trow-emoji").textContent = STATE_EMOJI[st];
  }

  function highlightCurrentRow() {
    quizTable.querySelectorAll(".trow").forEach(r => r.classList.remove("current"));
    if (currentQuestion) {
      const row = quizTable.querySelector(`[data-m="${currentQuestion.factorB}"]`);
      if (row) row.classList.add("current");
    }
  }

  // ── number button badges ──────────────────────────────────────────────────
  function refreshBadges() {
    const d = loadData();
    numberGrid.querySelectorAll(".number-btn").forEach(btn => {
      const n = Number(btn.dataset.n);
      const mastered = [...Array(10)].filter((_,i) => getState(d, n, i+1) === "dg").length;
      const old = btn.querySelector(".mbadge");
      if (old) old.remove();
      if (mastered > 0) {
        const b = document.createElement("span");
        b.className = "mbadge";
        b.textContent = `${mastered}/10`;
        btn.appendChild(b);
      }
    });
  }

  function updateSetupProgress(n) {
    const d       = loadData();
    const mastered = [...Array(10)].filter((_,i) => getState(d, n, i+1) === "dg").length;
    const pct     = Math.round(mastered / 10 * 100);
    progressWrap.classList.remove("hidden");
    progressLabel.textContent = `${mastered} / 10 soruda ustalaştın (%${pct})`;
    progressFill.style.width  = `${pct}%`;
  }

  // ── setup buttons ─────────────────────────────────────────────────────────
  function buildNumberButtons() {
    for (let n = 2; n <= 10; n++) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "number-btn";
      btn.dataset.n = n;
      btn.textContent = n;
      btn.addEventListener("click", () => selectNumber(n));
      numberGrid.appendChild(btn);
    }
    refreshBadges();
  }

  function selectNumber(n) {
    selectedNumber = n;
    numberGrid.querySelectorAll(".number-btn").forEach(b => {
      b.classList.toggle("active", Number(b.dataset.n) === n);
    });
    startBtn.disabled = false;
    updateSetupProgress(n);
    setupTable.classList.remove("hidden");
    renderTable(setupTable, n, null);
  }

  // ── queue building ────────────────────────────────────────────────────────
  function buildQueue(n) {
    const d = loadData();
    const groups = { rd: [], or: [], n: [], lg: [] };
    for (let m = 1; m <= 10; m++) {
      const st = getState(d, n, m);
      if (st !== "dg" && groups[st]) groups[st].push({ factorA: n, factorB: m, answer: n * m });
    }
    // priority: red → orange → neutral → light-green
    return [
      ...shuffle(groups.rd),
      ...shuffle(groups.or),
      ...shuffle(groups.n),
      ...shuffle(groups.lg),
    ];
  }

  // ── pills ─────────────────────────────────────────────────────────────────
  function updatePills() {
    const d       = loadData();
    const mastered = [...Array(10)].filter((_,i) =>
      getState(d, selectedNumber, i+1) === "dg").length;
    remainingPill.textContent = `Kaldı: ${questionQueue.length}`;
    masteredPill.textContent  = `Ustalaşılan: ${mastered} / 10`;
  }

  // ── quiz ──────────────────────────────────────────────────────────────────
  function nextQuestion() {
    if (questionQueue.length === 0) { endGame(); return; }

    locked = false;
    feedback.textContent = "";
    feedback.className = "feedback";

    currentQuestion = questionQueue[0];
    questionText.textContent =
      `${currentQuestion.factorA} × ${currentQuestion.factorB} = ?`;

    highlightCurrentRow();

    const choices = generateChoices(currentQuestion.answer);
    mcGrid.innerHTML = "";
    choices.forEach(val => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "choice-btn";
      btn.textContent = val;
      btn.addEventListener("click", () => handleChoice(btn, val));
      mcGrid.appendChild(btn);
    });
  }

  function handleChoice(btn, value) {
    if (locked) return;
    locked = true;
    sessionAttempts++;

    mcGrid.querySelectorAll(".choice-btn").forEach(b => b.disabled = true);

    const d    = loadData();
    const n    = currentQuestion.factorA;
    const m    = currentQuestion.factorB;
    const prev = getState(d, n, m);
    const correct = value === currentQuestion.answer;
    const next = nextState(prev, correct);

    d[stateKey(n, m)] = next;
    saveData(d);
    updateTableRow(m);

    if (correct) {
      btn.classList.add("correct");
      questionQueue.shift();

      if (next === "dg") {
        sessionMastered++;
        feedback.textContent = "Ustalaştın!";
        feedback.className = "feedback ok";
      } else {
        // lg — needs one more correct; move to end
        questionQueue.push(currentQuestion);
        feedback.textContent = "Doğru! Bir kez daha bil.";
        feedback.className = "feedback ok";
      }
    } else {
      btn.classList.add("wrong");
      mcGrid.querySelectorAll(".choice-btn").forEach(b => {
        if (Number(b.textContent) === currentQuestion.answer) b.classList.add("reveal");
      });
      feedback.textContent = `Yanlış! Doğru cevap: ${currentQuestion.answer}.`;
      feedback.className = "feedback err";
      // move to end of queue
      questionQueue.shift();
      questionQueue.push(currentQuestion);
    }

    updatePills();
    setTimeout(nextQuestion, 1100);
  }

  // ── game flow ─────────────────────────────────────────────────────────────
  function startGame() {
    questionQueue   = buildQueue(selectedNumber);
    sessionMastered = 0;
    sessionAttempts = 0;
    locked          = false;

    setupPanel.classList.add("hidden");
    summaryPanel.classList.add("hidden");
    quizPanel.classList.remove("hidden");

    renderTable(quizTable, selectedNumber, null);
    updatePills();
    nextQuestion();
  }

  function endGame() {
    quizPanel.classList.add("hidden");
    summaryPanel.classList.remove("hidden");

    const d       = loadData();
    const mastered = [...Array(10)].filter((_,i) =>
      getState(d, selectedNumber, i+1) === "dg").length;

    if (mastered === 10) {
      summaryText.textContent   = `${selectedNumber} çarpım tablosunda tam ustasın!`;
    } else {
      summaryText.textContent   = `Bu turda ${sessionMastered} yeni soruda ustalaştın!`;
    }
    summaryDetail.textContent = `${sessionAttempts} denemede ${sessionMastered} soruyu tamamladın.`;
    summaryTotal.textContent  = `Toplam: ${mastered} / 10 soruda ustasın.`;

    refreshBadges();
  }

  // ── wiring ────────────────────────────────────────────────────────────────
  startBtn.addEventListener("click", startGame);

  resetBtn.addEventListener("click", () => {
    if (!confirm("Tüm ilerleme silinecek. Emin misin?")) return;
    localStorage.removeItem(STORAGE_KEY);
    refreshBadges();
    if (selectedNumber) {
      updateSetupProgress(selectedNumber);
      renderTable(setupTable, selectedNumber, null);
    }
  });

  playAgainBtn.addEventListener("click", () => {
    summaryPanel.classList.add("hidden");
    setupPanel.classList.remove("hidden");
    refreshBadges();
    if (selectedNumber) {
      updateSetupProgress(selectedNumber);
      renderTable(setupTable, selectedNumber, null);
    }
  });

  buildNumberButtons();
</script>
</body>
</html>
