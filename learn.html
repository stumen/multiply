<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çarpma — Öğrenme Modu</title>
  <style>
    :root {
      --bg-top: #c8f0e8;
      --bg-bottom: #b8dff5;
      --card: rgba(255, 255, 255, 0.88);
      --text: #20304a;
      --accent: #2eaa82;
      --accent-strong: #1f9d68;
      --success: #1f9d68;
      --error: #d64545;
      --shadow: 0 22px 60px rgba(30, 60, 80, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.4), transparent 25%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .game {
      width: min(100%, 760px);
      background: var(--card);
      border: 4px solid rgba(255,255,255,0.7);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 28px 28px 18px;
      background: linear-gradient(135deg, rgba(46,170,130,0.18), rgba(130,210,255,0.32));
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3rem); line-height: 1; }

    .nav-link {
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent-strong);
      background: rgba(255,255,255,0.7);
      border: 2px solid rgba(46,170,130,0.3);
      border-radius: 999px;
      padding: 7px 14px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: background 140ms ease;
    }
    .nav-link:hover { background: rgba(255,255,255,0.95); }

    .subtitle { margin: 10px 0 0; font-size: 1.05rem; }

    .content { padding: 24px 28px 32px; display: grid; gap: 20px; }

    .panel {
      background: rgba(255,255,255,0.75);
      border-radius: 24px;
      padding: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(66px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    button { font: inherit; }

    .number-btn, .primary-btn, .choice-btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .number-btn {
      background: #e0f7f1;
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 700;
      box-shadow: 0 8px 16px rgba(46,170,130,0.15);
      position: relative;
    }

    .number-btn:hover, .number-btn:focus-visible,
    .primary-btn:hover, .primary-btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(30,60,80,0.16);
      outline: none;
    }

    .number-btn.active { background: var(--accent); color: white; }

    /* mastery badge on number buttons */
    .mastery-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--success);
      color: white;
      font-size: 0.6rem;
      font-weight: 800;
      border-radius: 999px;
      padding: 2px 5px;
      line-height: 1.4;
    }

    .primary-btn {
      background: var(--accent);
      color: white;
      font-weight: 700;
    }

    .primary-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .ghost-btn {
      background: transparent;
      border: 2px solid #ccc;
      border-radius: 18px;
      padding: 12px 20px;
      color: #888;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 140ms, color 140ms;
    }
    .ghost-btn:hover { border-color: var(--error); color: var(--error); }

    /* quiz top bar */
    .quiz-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .pill {
      background: #e0f7f1;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 700;
    }

    /* streak dots */
    .streak-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 4px;
    }

    .streak-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      background: transparent;
      transition: background 300ms ease;
    }
    .streak-dot.filled { background: var(--accent); }

    /* question */
    .question {
      font-size: clamp(2.4rem, 8vw, 4.4rem);
      text-align: center;
      font-weight: 800;
      margin: 6px 0 10px;
      letter-spacing: 0.04em;
    }

    /* multiple choice */
    .mc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 14px;
    }

    .choice-btn {
      background: #e0f7f1;
      color: var(--text);
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 8px 20px rgba(46,170,130,0.13);
      padding: 22px 10px;
    }

    .choice-btn:hover:not(:disabled), .choice-btn:focus-visible:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 14px 28px rgba(30,60,80,0.16);
      outline: none;
      background: #c2ede3;
    }

    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct { background: #d4f5e5; color: var(--success); }
    .choice-btn.wrong   { background: #fde0e0; color: var(--error); }
    .choice-btn.reveal  { background: #d4f5e5; color: var(--success); }

    /* feedback */
    .feedback {
      min-height: 2rem;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      margin-top: 14px;
    }
    .feedback.success { color: var(--success); }
    .feedback.error   { color: var(--error); }

    /* mastery bar on setup */
    .mastery-summary {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #555;
    }

    .mastery-bar-wrap {
      background: #ddf0ea;
      border-radius: 999px;
      height: 10px;
      margin-top: 6px;
      overflow: hidden;
    }

    .mastery-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 400ms ease;
    }

    /* summary */
    .summary { text-align: center; }
    .summary strong { font-size: 1.3rem; }

    .answer-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }

    .hidden { display: none; }

    @media (max-width: 640px) {
      .hero, .content { padding-left: 18px; padding-right: 18px; }
      .panel { padding: 18px; }
      .mc-grid { gap: 10px; }
      .choice-btn { font-size: 1.3rem; padding: 18px 8px; }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="hero">
      <div class="hero-top">
        <h1>Öğrenme Modu</h1>
        <a class="nav-link" href="index.html">Test Modu →</a>
      </div>
      <p class="subtitle">Yanlış cevaplar sıfırdan başlar — her soruyu arka arkaya 2 kez doğru bil ve ustalaş.</p>
    </section>

    <section class="content">

      <!-- Setup -->
      <section class="panel" id="setup-panel">
        <h2>Hangi sayıları çalışmak istiyorsun?</h2>
        <div class="choices" id="number-choices" aria-label="2'den 10'a kadar sayılar"></div>

        <div class="mastery-summary" id="mastery-summary"></div>

        <div class="answer-row" style="margin-top:20px;">
          <button class="primary-btn" id="start-btn" type="button" disabled>Başlat</button>
          <button class="ghost-btn"   id="reset-btn" type="button">İlerlemeyi Sıfırla</button>
        </div>
      </section>

      <!-- Quiz -->
      <section class="panel hidden" id="quiz-panel">
        <div class="quiz-top">
          <div class="pill" id="remaining-pill">Kaldı: 0</div>
          <div class="pill" id="mastered-pill">Ustalaşılan: 0</div>
        </div>

        <div class="streak-row" id="streak-row">
          <div class="streak-dot" id="dot-0"></div>
          <div class="streak-dot" id="dot-1"></div>
        </div>

        <div class="question" id="question-text"></div>

        <div class="mc-grid" id="mc-grid"></div>

        <div class="feedback" id="feedback"></div>
      </section>

      <!-- Summary -->
      <section class="panel summary hidden" id="summary-panel">
        <p><strong id="summary-text"></strong></p>
        <p id="summary-detail"></p>
        <p id="summary-total"></p>
        <div class="answer-row">
          <button class="primary-btn" id="play-again-btn" type="button">Tekrar Çalış</button>
        </div>
      </section>

    </section>
  </main>

  <script>
    // ── DOM refs ──────────────────────────────────────────────────────────────
    const numberChoices  = document.getElementById("number-choices");
    const startBtn       = document.getElementById("start-btn");
    const resetBtn       = document.getElementById("reset-btn");
    const playAgainBtn   = document.getElementById("play-again-btn");
    const setupPanel     = document.getElementById("setup-panel");
    const quizPanel      = document.getElementById("quiz-panel");
    const summaryPanel   = document.getElementById("summary-panel");
    const remainingPill  = document.getElementById("remaining-pill");
    const masteredPill   = document.getElementById("mastered-pill");
    const dot0           = document.getElementById("dot-0");
    const dot1           = document.getElementById("dot-1");
    const questionText   = document.getElementById("question-text");
    const mcGrid         = document.getElementById("mc-grid");
    const feedback       = document.getElementById("feedback");
    const summaryText    = document.getElementById("summary-text");
    const summaryDetail  = document.getElementById("summary-detail");
    const summaryTotal   = document.getElementById("summary-total");
    const masterySummary = document.getElementById("mastery-summary");

    // ── constants ─────────────────────────────────────────────────────────────
    const STORAGE_KEY   = "multiply_mastery";
    const NEEDED        = 2;   // consecutive correct answers to master a question

    // ── state ─────────────────────────────────────────────────────────────────
    const selectedNumbers = new Set();
    let questionQueue  = [];   // unmastered questions for this session
    let currentQuestion = null;
    let locked = false;
    let sessionMastered = 0;   // newly mastered this session
    let sessionAttempts = 0;

    // ── persistence ───────────────────────────────────────────────────────────

    function loadMastery() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveMastery(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function masteryKey(q) {
      return `${q.factorA}_${q.factorB}`;
    }

    function getStreak(data, q) {
      return data[masteryKey(q)] || 0;
    }

    function isMastered(data, q) {
      return getStreak(data, q) >= NEEDED;
    }

    // ── helpers ───────────────────────────────────────────────────────────────

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function allQuestions(numbers) {
      const list = [];
      for (const n of numbers) {
        for (let m = 1; m <= 10; m++) {
          list.push({ factorA: n, factorB: m, answer: n * m });
        }
      }
      return list;
    }

    function generateChoices(correct) {
      const offsets = shuffle([-7,-6,-5,-4,-3,-2,-1,1,2,3,4,5,6,7]);
      const wrong = [];
      for (const offset of offsets) {
        const c = correct + offset;
        if (c > 0 && c !== correct && !wrong.includes(c)) {
          wrong.push(c);
          if (wrong.length === 2) break;
        }
      }
      return shuffle([correct, ...wrong]);
    }

    // ── setup UI ──────────────────────────────────────────────────────────────

    function buildChoiceButtons() {
      for (let n = 2; n <= 10; n++) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "number-btn";
        btn.dataset.number = n;

        const label = document.createElement("span");
        label.textContent = n;
        btn.appendChild(label);

        btn.addEventListener("click", () => {
          if (selectedNumbers.has(n)) selectedNumbers.delete(n);
          else selectedNumbers.add(n);
          btn.classList.toggle("active", selectedNumbers.has(n));
          startBtn.disabled = selectedNumbers.size === 0;
          updateMasterySummary();
        });
        numberChoices.appendChild(btn);
      }
      refreshNumberBadges();
    }

    function refreshNumberBadges() {
      const data = loadMastery();
      numberChoices.querySelectorAll(".number-btn").forEach(btn => {
        const n = Number(btn.dataset.number);
        const qs = allQuestions([n]);
        const masteredCount = qs.filter(q => isMastered(data, q)).length;
        const existing = btn.querySelector(".mastery-badge");
        if (existing) existing.remove();
        if (masteredCount > 0) {
          const badge = document.createElement("span");
          badge.className = "mastery-badge";
          badge.textContent = `${masteredCount}/${qs.length}`;
          btn.appendChild(badge);
        }
      });
    }

    function updateMasterySummary() {
      if (selectedNumbers.size === 0) {
        masterySummary.innerHTML = "";
        return;
      }
      const data = loadMastery();
      const qs = allQuestions([...selectedNumbers]);
      const masteredCount = qs.filter(q => isMastered(data, q)).length;
      const pct = Math.round((masteredCount / qs.length) * 100);
      masterySummary.innerHTML = `
        <span>${masteredCount} / ${qs.length} soruda ustalaştın (%${pct})</span>
        <div class="mastery-bar-wrap">
          <div class="mastery-bar-fill" style="width:${pct}%"></div>
        </div>`;
    }

    // ── quiz ──────────────────────────────────────────────────────────────────

    function buildQueue() {
      const data = loadMastery();
      const qs = allQuestions([...selectedNumbers]);
      // unmastered first (streak=0 before streak=1), then shuffle within groups
      const group0 = shuffle(qs.filter(q => getStreak(data, q) === 0));
      const group1 = shuffle(qs.filter(q => getStreak(data, q) === 1));
      return [...group0, ...group1];
    }

    function updatePills() {
      const data = loadMastery();
      const total = allQuestions([...selectedNumbers]).length;
      const masteredCount = allQuestions([...selectedNumbers]).filter(q => isMastered(data, q)).length;
      remainingPill.textContent = `Kaldı: ${questionQueue.length}`;
      masteredPill.textContent  = `Ustalaşılan: ${masteredCount} / ${total}`;
    }

    function updateStreakDots(streak) {
      dot0.classList.toggle("filled", streak >= 1);
      dot1.classList.toggle("filled", streak >= 2);
    }

    function nextQuestion() {
      if (questionQueue.length === 0) {
        endGame();
        return;
      }
      locked = false;
      feedback.textContent = "";
      feedback.className = "feedback";

      currentQuestion = questionQueue[0];
      const data = loadMastery();
      const streak = getStreak(data, currentQuestion);
      updateStreakDots(streak);

      questionText.textContent = `${currentQuestion.factorA} × ${currentQuestion.factorB} = ?`;

      const choices = generateChoices(currentQuestion.answer);
      mcGrid.innerHTML = "";
      choices.forEach(value => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.textContent = value;
        btn.addEventListener("click", () => handleChoice(btn, value));
        mcGrid.appendChild(btn);
      });
    }

    function handleChoice(btn, value) {
      if (locked) return;
      locked = true;
      sessionAttempts++;

      const allBtns = mcGrid.querySelectorAll(".choice-btn");
      allBtns.forEach(b => b.disabled = true);

      const data = loadMastery();
      const key  = masteryKey(currentQuestion);

      if (value === currentQuestion.answer) {
        const newStreak = (data[key] || 0) + 1;
        data[key] = newStreak;
        saveMastery(data);

        btn.classList.add("correct");

        if (newStreak >= NEEDED) {
          // mastered — remove from queue
          questionQueue.shift();
          sessionMastered++;
          feedback.textContent = "Ustalaştın! Harika!";
          feedback.className = "feedback success";
        } else {
          // one more correct needed — move to end of queue
          questionQueue.shift();
          questionQueue.push(currentQuestion);
          feedback.textContent = `Doğru! Bir kez daha bil.`;
          feedback.className = "feedback success";
        }
      } else {
        // wrong — reset streak, move to end of queue
        data[key] = 0;
        saveMastery(data);

        btn.classList.add("wrong");
        allBtns.forEach(b => {
          if (Number(b.textContent) === currentQuestion.answer) b.classList.add("reveal");
        });
        feedback.textContent = `Yanlış! Doğru cevap: ${currentQuestion.answer}. Seri sıfırlandı.`;
        feedback.className = "feedback error";

        // move to end of queue
        questionQueue.shift();
        questionQueue.push(currentQuestion);
      }

      updatePills();
      setTimeout(nextQuestion, 1100);
    }

    // ── game flow ─────────────────────────────────────────────────────────────

    function startGame() {
      questionQueue   = buildQueue();
      sessionMastered = 0;
      sessionAttempts = 0;
      locked          = false;

      if (questionQueue.length === 0) {
        // everything already mastered
        setupPanel.classList.add("hidden");
        summaryPanel.classList.remove("hidden");
        const total = allQuestions([...selectedNumbers]).length;
        summaryText.textContent   = "Tüm sorularda zaten ustasın!";
        summaryDetail.textContent = `Seçilen ${total} sorunun hepsi tamamlandı.`;
        summaryTotal.textContent  = "";
        return;
      }

      setupPanel.classList.add("hidden");
      summaryPanel.classList.add("hidden");
      quizPanel.classList.remove("hidden");

      updatePills();
      nextQuestion();
    }

    function endGame() {
      quizPanel.classList.add("hidden");
      summaryPanel.classList.remove("hidden");

      const data  = loadMastery();
      const total = allQuestions([...selectedNumbers]).length;
      const masteredCount = allQuestions([...selectedNumbers]).filter(q => isMastered(data, q)).length;

      summaryText.textContent   = `Bu turda ${sessionMastered} yeni soruda ustalaştın!`;
      summaryDetail.textContent = `${sessionAttempts} denemede ${sessionMastered} soruyu tamamladın.`;
      summaryTotal.textContent  = `Toplam ilerleme: ${masteredCount} / ${total} soruda ustasın.`;

      refreshNumberBadges();
    }

    // ── wiring ────────────────────────────────────────────────────────────────

    startBtn.addEventListener("click", startGame);

    resetBtn.addEventListener("click", () => {
      if (!confirm("Tüm ilerleme silinecek. Emin misin?")) return;
      localStorage.removeItem(STORAGE_KEY);
      refreshNumberBadges();
      updateMasterySummary();
    });

    playAgainBtn.addEventListener("click", () => {
      summaryPanel.classList.add("hidden");
      setupPanel.classList.remove("hidden");
      refreshNumberBadges();
      updateMasterySummary();
    });

    buildChoiceButtons();
  </script>
</body>
</html>
